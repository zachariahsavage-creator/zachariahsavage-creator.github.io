<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <title>Zach Savage – Home</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;0,9..40,800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <a class="page-center-title" href="index.html">ZACH SAVAGE PHOTOGRAPHY</a>
    <header class="gallery-bar" aria-label="Home header">
      <div class="gallery-bar__anchor">
        <div class="gallery-bar__brand" id="gallery-bar-menu">
          <div class="gallery-bar__brand-row">
            <h1 class="gallery-bar__title">home</h1>
            <button
              class="gallery-bar__menu-trigger"
              type="button"
              aria-label="Open menu"
              aria-expanded="false"
            >
              <span class="gallery-bar__menu-icon" aria-hidden="true">
                <span></span>
                <span></span>
                <span></span>
              </span>
            </button>
          </div>
          <div class="gallery-bar__menu-content" aria-hidden="true">
            <div class="gallery-bar__menu-inner">
              <a class="gallery-bar__menu-link" href="index.html">gallery</a>
              <a class="gallery-bar__menu-link" href="contact.html">contact</a>
            </div>
          </div>
        </div>
      </div>
    </header>

    <main class="page">
      <section class="gallery" aria-label="Moving gallery">
        <div class="gallery-row" id="row-top"></div>
        <div class="gallery-row" id="row-bottom"></div>
      </section>
    </main>

    <button
      class="gallery-flow-arrow gallery-flow-arrow--left"
      type="button"
      aria-label="Speed flow left (7.5x while held)"
    >
      <span aria-hidden="true">
        <svg
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2.5"
          stroke-linecap="round"
          stroke-linejoin="round"
          xmlns="http://www.w3.org/2000/svg"
        >
          <path d="M15 18l-6-6 6-6" />
        </svg>
      </span>
    </button>

    <button
      class="gallery-flow-arrow gallery-flow-arrow--right"
      type="button"
      aria-label="Speed flow right (7.5x while held)"
    >
      <span aria-hidden="true">
        <svg
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2.5"
          stroke-linecap="round"
          stroke-linejoin="round"
          xmlns="http://www.w3.org/2000/svg"
        >
          <path d="M9 6l6 6-6 6" />
        </svg>
      </span>
    </button>

    <div class="lightbox" aria-modal="true" role="dialog" data-state="closed">
      <div class="lightbox__backdrop"></div>
      <div class="lightbox__content">
        <button class="lightbox__close" type="button" aria-label="Close">
          <span class="lightbox__close-icon" aria-hidden="true">✕</span>
        </button>
        <button
          class="lightbox__arrow lightbox__arrow--prev"
          type="button"
          aria-label="Previous image"
        >
          <span class="lightbox__arrow-icon" aria-hidden="true">
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2.5"
              stroke-linecap="round"
              stroke-linejoin="round"
              xmlns="http://www.w3.org/2000/svg"
            >
              <path d="M15 18l-6-6 6-6" />
            </svg>
          </span>
        </button>
        <button
          class="lightbox__arrow lightbox__arrow--next"
          type="button"
          aria-label="Next image"
        >
          <span class="lightbox__arrow-icon" aria-hidden="true">
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2.5"
              stroke-linecap="round"
              stroke-linejoin="round"
              xmlns="http://www.w3.org/2000/svg"
            >
              <path d="M9 6l6 6-6 6" />
            </svg>
          </span>
        </button>
        <div class="lightbox__media">
          <img class="lightbox__image" alt="" />
          <video class="lightbox__video" muted playsinline loop></video>
        </div>
      </div>
    </div>

    <script src="gallery-menu.js"></script>
    <script src="script.js"></script>
  </body>
</html>
