<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <title>Contact – Zach Savage</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;0,9..40,800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="page-contact">
    <div class="contact-bg" aria-hidden="true">
      <div class="contact-bg__layer contact-bg__layer--a"></div>
      <div class="contact-bg__layer contact-bg__layer--b"></div>
    </div>
    <a class="page-center-title" href="index.html">ZACH SAVAGE PHOTOGRAPHY</a>
    <header class="gallery-bar" aria-label="Gallery header">
      <div class="gallery-bar__anchor">
        <div class="gallery-bar__brand" id="gallery-bar-menu">
          <div class="gallery-bar__brand-row">
            <h1 class="gallery-bar__title">contact</h1>
            <button class="gallery-bar__menu-trigger" type="button" aria-label="Open menu" aria-expanded="false">
              <span class="gallery-bar__menu-icon" aria-hidden="true">
                <span></span>
                <span></span>
                <span></span>
              </span>
            </button>
          </div>
          <div class="gallery-bar__menu-content" aria-hidden="true">
            <div class="gallery-bar__menu-inner">
              <a class="gallery-bar__menu-link" href="index.html">gallery</a>
              <a class="gallery-bar__menu-link" href="home.html">home</a>
            </div>
          </div>
        </div>
      </div>
    </header>

    <main class="page page--contact">
      <section class="contact" aria-label="Contact">
        <div class="contact__card">
          <h2 class="contact__heading">Get in touch</h2>
          <p class="contact__intro">Send an inquiry to zachariahsavage@gmail.com</p>

          <form class="contact__form" id="contact-form" novalidate>
            <label class="contact__label" for="contact-subject">Heading</label>
            <input
              class="contact__input"
              id="contact-subject"
              name="subject"
              type="text"
              placeholder="e.g. Collaboration inquiry"
              required
            />
            <label class="contact__label" for="contact-message">Message</label>
            <textarea
              class="contact__textarea"
              id="contact-message"
              name="body"
              rows="5"
              placeholder="Hi there, I'm Zach! Feel free to message me here!"
              required
            ></textarea>
            <button class="contact__submit" type="submit">Send inquiry</button>
          </form>

          <div class="contact__social">
            <a
              class="contact__instagram"
              href="https://www.instagram.com/zach.a.r.i.a.h/"
              target="_blank"
              rel="noopener noreferrer"
              aria-label="Zach Savage on Instagram"
            >
              <svg class="contact__instagram-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                <rect x="2" y="2" width="20" height="20" rx="5" ry="5"/>
                <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/>
                <line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/>
              </svg>
              <span class="contact__instagram-label">Instagram</span>
            </a>
          </div>
        </div>
      </section>
    </main>

    <script src="gallery-menu.js"></script>
    <script src="contact.js"></script>
  </body>
</html>
