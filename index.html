<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <title>Zach Savage – Gallery</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="page-center-title">ZACH SAVAGE PHOTOGRAPHY</div>
    <header class="gallery-bar" aria-label="Gallery header">
      <div class="gallery-bar__anchor">
        <div class="gallery-bar__brand" id="gallery-bar-menu">
          <div class="gallery-bar__brand-row">
            <h1 class="gallery-bar__title">gallery</h1>
            <button class="gallery-bar__menu-trigger" type="button" aria-label="Open menu" aria-expanded="false">
              <span class="gallery-bar__menu-icon" aria-hidden="true">
                <span></span>
                <span></span>
                <span></span>
              </span>
            </button>
          </div>
          <div class="gallery-bar__menu-content" aria-hidden="true">
            <a class="gallery-bar__menu-link" href="contact.html">contact</a>
            <a class="gallery-bar__menu-link" href="home.html">home</a>
          </div>
        </div>
      </div>
    </header>

    <main class="page">
      <section class="portfolio" aria-label="Gallery">
        <div class="portfolio-controls" aria-label="Gallery controls">
          <div class="portfolio-filters" role="tablist" aria-label="Filter gallery">
            <button class="portfolio-filter is-active" type="button" data-filter="all">
              all
            </button>
            <button class="portfolio-filter" type="button" data-filter="stills">
              stills
            </button>
            <button class="portfolio-filter" type="button" data-filter="video">
              video
            </button>
          </div>
          <div class="portfolio-meta" id="portfolio-meta" aria-hidden="true"></div>
        </div>

        <div class="portfolio-grid" id="gallery-grid" aria-label="Gallery grid"></div>
      </section>
    </main>

    <div class="lightbox" aria-modal="true" role="dialog" data-state="closed">
      <div class="lightbox__backdrop"></div>
      <div class="lightbox__content">
        <button class="lightbox__close" type="button" aria-label="Close">
          <span class="lightbox__close-icon" aria-hidden="true">✕</span>
        </button>
        <button
          class="lightbox__arrow lightbox__arrow--prev"
          type="button"
          aria-label="Previous image"
        >
          <span class="lightbox__arrow-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" xmlns="http://www.w3.org/2000/svg">
              <path d="M15 18l-6-6 6-6" />
            </svg>
          </span>
        </button>
        <button
          class="lightbox__arrow lightbox__arrow--next"
          type="button"
          aria-label="Next image"
        >
          <span class="lightbox__arrow-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" xmlns="http://www.w3.org/2000/svg">
              <path d="M9 6l6 6-6 6" />
            </svg>
          </span>
        </button>
        <div class="lightbox__media">
          <img class="lightbox__image" alt="" />
          <video class="lightbox__video" muted playsinline loop></video>
        </div>
      </div>
    </div>

    <script src="gallery.js"></script>
  </body>
</html>
