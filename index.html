<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Zach Savage – Photography</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <!-- Global fixed overlay -->
    <div class="page-center-title">ZACH SAVAGE PHOTOGRAPHY</div>

    <!-- Global Header -->
    <header class="gallery-bar" aria-label="Main header">
      <div class="gallery-bar__anchor">
        <div class="gallery-bar__brand" id="gallery-bar-menu">
          <div class="gallery-bar__brand-row">
            <!-- Title acts as ScrollSpy, updating dynamically -->
            <h1 class="gallery-bar__title">home</h1>
            <button class="gallery-bar__menu-trigger" type="button" aria-label="Open menu" aria-expanded="false">
              <span class="gallery-bar__menu-icon" aria-hidden="true">
                <span></span><span></span><span></span>
              </span>
            </button>
          </div>
          <div class="gallery-bar__menu-content" aria-hidden="true">
            <a class="gallery-bar__menu-link" href="#home">home</a>
            <a class="gallery-bar__menu-link" href="#gallery">gallery</a>
            <a class="gallery-bar__menu-link" href="#contact">contact</a>
          </div>
        </div>
      </div>
    </header>

    <main class="main-scroller">
      
      <!-- ================= SECTION: HOME ================= -->
      <section id="home" class="page-section section-home">
        <!-- Replaces global body backgrounds to contain it to this section -->
        <div class="section-bg section-bg--home" aria-hidden="true"></div>

        <div class="gallery-key-hint" aria-hidden="true">
          <span class="gallery-key-hint__icon">←</span>
          <span class="gallery-key-hint__icon">→</span>
          <span class="gallery-key-hint__text">Use arrow keys to move · Click any image to expand</span>
        </div>

        <section class="gallery" aria-label="Moving gallery">
          <div class="gallery-row" id="row-top"></div>
          <div class="gallery-row" id="row-bottom"></div>
        </section>

        <button class="gallery-flow-arrow gallery-flow-arrow--left" type="button" aria-label="Speed flow left">
          <span aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" xmlns="http://www.w3.org/2000/svg"><path d="M15 18l-6-6 6-6" /></svg>
          </span>
        </button>

        <button class="gallery-flow-arrow gallery-flow-arrow--right" type="button" aria-label="Speed flow right">
          <span aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" xmlns="http://www.w3.org/2000/svg"><path d="M9 6l6 6-6 6" /></svg>
          </span>
        </button>
      </section>

      <!-- ================= SECTION: GALLERY ================= -->
      <section id="gallery" class="page-section section-gallery">
        <div class="section-bg section-bg--gallery" aria-hidden="true"></div>

        <section class="portfolio" aria-label="Gallery">
          <div class="portfolio-controls" aria-label="Gallery controls">
            <div class="portfolio-filters" role="tablist" aria-label="Filter gallery">
              <button class="portfolio-filter is-active" type="button" data-filter="all">all</button>
              <button class="portfolio-filter" type="button" data-filter="stills">stills</button>
              <button class="portfolio-filter" type="button" data-filter="video">video</button>
            </div>
            <div class="portfolio-meta" id="portfolio-meta" aria-hidden="true"></div>
          </div>
          <div class="portfolio-grid" id="gallery-grid" aria-label="Gallery grid"></div>
        </section>
      </section>

      <!-- ================= SECTION: CONTACT ================= -->
      <section id="contact" class="page-section section-contact">
        <!-- Crossfading layer from contact page -->
        <div class="contact-bg" aria-hidden="true">
          <div class="contact-bg__layer contact-bg__layer--a"></div>
          <div class="contact-bg__layer contact-bg__layer--b"></div>
        </div>

        <section class="contact" aria-label="Contact">
          <div class="contact__card">
            <h2 class="contact__heading">Get in touch</h2>
            <p class="contact__intro">Send an inquiry to zachariahsavage@gmail.com</p>

            <form class="contact__form" id="contact-form" novalidate>
              <label class="contact__label" for="contact-subject">Heading</label>
              <input class="contact__input" id="contact-subject" name="subject" type="text" placeholder="e.g. Collaboration inquiry" required />
              
              <label class="contact__label" for="contact-message">Message</label>
              <textarea class="contact__textarea" id="contact-message" name="body" rows="6" placeholder="Hi there! Let's work together..." required></textarea>
              
              <button class="contact__submit" type="submit">Send inquiry</button>
            </form>

            <div class="contact__social">
              <a class="contact__instagram" href="https://www.instagram.com/zach.a.r.i.a.h/" target="_blank" rel="noopener noreferrer" aria-label="Zach Savage on Instagram">
                <svg class="contact__instagram-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                  <rect x="2" y="2" width="20" height="20" rx="5" ry="5"/>
                  <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/>
                  <line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/>
                </svg>
                <span class="contact__instagram-label">Instagram</span>
              </a>
            </div>
          </div>
        </section>
      </section>

    </main>

    <!-- Global Lightbox Component (Shared by both galleries) -->
    <div class="lightbox" aria-modal="true" role="dialog" data-state="closed">
      <div class="lightbox__backdrop"></div>
      <div class="lightbox__content">
        <button class="lightbox__close" type="button" aria-label="Close">
          <span class="lightbox__close-icon" aria-hidden="true">✕</span>
        </button>
        <button class="lightbox__arrow lightbox__arrow--prev" type="button" aria-label="Previous image">
          <span class="lightbox__arrow-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" xmlns="http://www.w3.org/2000/svg"><path d="M15 18l-6-6 6-6" /></svg>
          </span>
        </button>
        <button class="lightbox__arrow lightbox__arrow--next" type="button" aria-label="Next image">
          <span class="lightbox__arrow-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" xmlns="http://www.w3.org/2000/svg"><path d="M9 6l6 6-6 6" /></svg>
          </span>
        </button>
        <div class="lightbox__media">
          <img class="lightbox__image" alt="" />
          <video class="lightbox__video" muted playsinline loop></video>
        </div>
      </div>
    </div>

    <script src="main.js"></script>
  </body>
</html>
