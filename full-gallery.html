<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <title>Gallery - Zach Savage</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;0,9..40,800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="page-full-gallery">
    <div class="full-gallery-page-bg" aria-hidden="true">
      <img src="3.webp" alt="" width="6048" height="4032" decoding="async" />
    </div>
    <nav class="header-social" aria-label="Social and email">
      <a
        class="header-social__link"
        href="https://www.instagram.com/zach.a.r.i.a.h/"
        target="_blank"
        rel="noopener noreferrer"
        aria-label="Instagram"
      >
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.35" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <rect x="2" y="2" width="20" height="20" rx="5" ry="5" />
          <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z" />
          <line x1="17.5" y1="6.5" x2="17.51" y2="6.5" />
        </svg>
      </a>
      <a
        class="header-social__link"
        href="mailto:zachariahsavage@gmail.com"
        aria-label="Email Zach Savage"
      >
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.35" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <rect x="2" y="4" width="20" height="16" rx="2" />
          <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7" />
        </svg>
      </a>
    </nav>
    <a class="page-center-title" href="index.html">ZACH SAVAGE PHOTOGRAPHY</a>
    <header class="gallery-bar" aria-label="Site header">
      <div class="gallery-bar__anchor">
        <div class="gallery-bar__brand" id="gallery-bar-menu">
          <div class="gallery-bar__brand-row">
            <h1 class="gallery-bar__title" id="section-title" aria-live="polite">
              gallery
            </h1>
            <button
              class="gallery-bar__menu-trigger"
              type="button"
              aria-label="Open menu"
              aria-expanded="false"
            >
              <span class="gallery-bar__menu-icon" aria-hidden="true">
                <span></span>
                <span></span>
                <span></span>
              </span>
            </button>
          </div>
          <div class="gallery-bar__menu-content" aria-hidden="true">
            <div class="gallery-bar__menu-inner">
              <a class="gallery-bar__menu-link" href="index.html">home</a>
              <a class="gallery-bar__menu-link" href="full-gallery.html">gallery</a>
              <a class="gallery-bar__menu-link" href="index.html#contact-heading">contact</a>
            </div>
          </div>
        </div>
      </div>
    </header>

    <main class="page page--onepage">
      <section
        class="onepage-section onepage-section--gallery"
        id="gallery-section"
        data-section-label="gallery"
        aria-label="Gallery"
      >
        <a class="full-gallery-contact-btn" href="index.html#contact-heading">Contact</a>
        <section class="portfolio">
          <div class="portfolio-controls" aria-label="Gallery controls">
            <div class="portfolio-meta" id="portfolio-meta" aria-hidden="true"></div>
          </div>

          <div class="portfolio-grid" id="gallery-grid" aria-label="Gallery grid"></div>
        </section>
      </section>
    </main>

    <div class="lightbox" aria-modal="true" role="dialog" data-state="closed">
      <div class="lightbox__backdrop"></div>
      <div class="lightbox__content">
        <button class="lightbox__close" type="button" aria-label="Close">
          <span class="lightbox__close-icon" aria-hidden="true">✕</span>
        </button>
        <button
          class="lightbox__arrow lightbox__arrow--prev"
          type="button"
          aria-label="Previous image"
        >
          <span class="lightbox__arrow-icon" aria-hidden="true">
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2.5"
              stroke-linecap="round"
              stroke-linejoin="round"
              xmlns="http://www.w3.org/2000/svg"
            >
              <path d="M15 18l-6-6 6-6" />
            </svg>
          </span>
        </button>
        <button
          class="lightbox__arrow lightbox__arrow--next"
          type="button"
          aria-label="Next image"
        >
          <span class="lightbox__arrow-icon" aria-hidden="true">
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2.5"
              stroke-linecap="round"
              stroke-linejoin="round"
              xmlns="http://www.w3.org/2000/svg"
            >
              <path d="M9 6l6 6-6 6" />
            </svg>
          </span>
        </button>
        <div class="lightbox__media">
          <img class="lightbox__image" alt="" />
          <video class="lightbox__video" muted playsinline loop></video>
        </div>
      </div>
    </div>

    <script src="gallery-menu.js"></script>
    <script src="onepage.js"></script>
  </body>
</html>
